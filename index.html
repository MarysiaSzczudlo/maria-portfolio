<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maria Szczudło — UX/UI Designer</title>
    <meta name="description" content="Portfolio of Maria Szczudło — UX/UI Product Designer with GenAI Experience. Automotive HMI, fintech, and AI-driven experiences." />
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    <script>
      // Restore the URL captured by public/404.html (SPA fallback on GitHub Pages).
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
